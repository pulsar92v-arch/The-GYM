<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <button onclick="goHome()">⬅ Back</button>
  <h2>Dashboard</h2>
</header>

<nav>
  <button onclick="showTab('members')">Members</button>
  <button onclick="showTab('stock')">Stock</button>
  <button onclick="showTab('inquiry')">Inquiry</button>
</nav>

<div id="members" class="tab active">
  <h3>Add Member</h3>
  <input id="name">
  <input type="date" id="joinDate">
  <select id="plan">
    <option value="30">Monthly</option>
    <option value="90">Quarterly</option>
  </select>
  <button onclick="addMember()">Add</button>

  <ul id="memberList"></ul>
  <ul id="alerts"></ul>
</div>

<div id="stock" class="tab">
  <input id="product">
  <input type="number" id="quantity">
  <button onclick="addStock()">Add</button>
  <ul id="stockList"></ul>
</div>

<div id="inquiry" class="tab">
  <ul id="inquiryList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
